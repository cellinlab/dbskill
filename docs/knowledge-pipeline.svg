<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">dbskill 知识来源图</title>
  <desc id="desc">dontbesilent 累计发布 16152 条推文，本轮处理 12307 条，筛选出 4201 条实质性内容，拆分为 4176 个知识原子，最终组合成知识包和 26 个 AI Skills。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1e3a8a; }
      .number { font: 700 38px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1d4ed8; }
      .number-inverse { font: 700 38px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .body { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .body-inverse { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #dbeafe; }
      .arrow-label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #2563eb; }
      .asset { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .card { fill: #ffffff; stroke: #bfdbfe; stroke-width: 2; filter: url(#shadow); }
      .flow { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="560" fill="#f8fafc"/>
  <text class="title" x="70" y="62">dbskill 的知识从哪里来</text>
  <text class="subtitle" x="70" y="100">从长期内容积累中筛选、拆分，再组合成可以直接调用的能力。</text>

  <rect class="card" x="70" y="165" width="230" height="205" rx="24"/>
  <text class="label" x="185" y="213" text-anchor="middle">累计发布推文</text>
  <text class="number" x="185" y="276" text-anchor="middle">16,152</text>
  <text class="body" x="185" y="320" text-anchor="middle">dontbesilent 长期内容积累</text>

  <path class="flow" d="M 300 267 H 350"/>
  <text class="arrow-label" x="325" y="244" text-anchor="middle">纳入</text>

  <rect class="card" x="365" y="165" width="230" height="205" rx="24"/>
  <text class="label" x="480" y="213" text-anchor="middle">本轮处理</text>
  <text class="number" x="480" y="276" text-anchor="middle">12,307</text>
  <text class="body" x="480" y="320" text-anchor="middle">统一清洗与结构化处理</text>

  <path class="flow" d="M 595 267 H 645"/>
  <text class="arrow-label" x="620" y="244" text-anchor="middle">筛选</text>

  <rect class="card" x="660" y="165" width="230" height="205" rx="24"/>
  <text class="label" x="775" y="213" text-anchor="middle">实质性内容</text>
  <text class="number" x="775" y="276" text-anchor="middle">4,201</text>
  <text class="body" x="775" y="320" text-anchor="middle">保留有判断和方法的内容</text>

  <path class="flow" d="M 890 267 H 940"/>
  <text class="arrow-label" x="915" y="244" text-anchor="middle">拆分</text>

  <rect class="card" x="955" y="165" width="230" height="205" rx="24"/>
  <text class="label" x="1070" y="213" text-anchor="middle">知识原子</text>
  <text class="number" x="1070" y="276" text-anchor="middle">4,176</text>
  <text class="body" x="1070" y="320" text-anchor="middle">可检索、可引用、可重组</text>

  <path class="flow" d="M 1185 267 H 1235"/>
  <text class="arrow-label" x="1210" y="244" text-anchor="middle">组合</text>

  <rect x="1250" y="145" width="280" height="245" rx="26" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="1390" y="202" text-anchor="middle" style="font:700 20px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff">可调用能力</text>
  <text class="number-inverse" x="1390" y="268" text-anchor="middle">26 Skills</text>
  <text class="body-inverse" x="1390" y="312" text-anchor="middle">方法论知识包・诊断规则</text>
  <rect x="1290" y="336" width="200" height="32" rx="16" fill="#ffffff" fill-opacity="0.16"/>
  <text x="1390" y="358" text-anchor="middle" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff">由 /dbs 动态调用</text>

  <rect x="210" y="435" width="1180" height="70" rx="22" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text class="asset" x="800" y="478" text-anchor="middle">公开资产：atoms.jsonl　・　Skill 知识包　・　高频概念词典　・　26 个 SKILL.md</text>
</svg>
