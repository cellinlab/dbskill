<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">dbskill 动态路由图</title>
  <desc id="desc">用户交付当前信息，dbs 根据上下文选择一个 Skill。Skill 产出结果后，用户的新反馈回到 dbs，重新判断下一步。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 36px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
      .step { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .step-inverse { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .body { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .body-inverse { font: 400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #dbeafe; }
      .group-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1e3a8a; }
      .chip { font: 500 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #1e3a8a; }
      .badge { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1d4ed8; }
      .loop-label { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1d4ed8; }
      .card { fill: #ffffff; stroke: #dbe4f0; stroke-width: 2; filter: url(#shadow); }
      .group { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; }
      .chip-bg { fill: #ffffff; stroke: #bfdbfe; stroke-width: 1; }
      .flow { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>

  <text class="title" x="80" y="70">dbskill 动态路由</text>
  <text class="subtitle" x="80" y="108">每次只处理当前最关键的一步，下一步由实际结果和用户反馈决定。</text>
  <rect x="1235" y="48" width="285" height="54" rx="27" fill="#dbeafe"/>
  <text class="badge" x="1377" y="82" text-anchor="middle">单步执行・结果驱动</text>

  <rect class="card" x="80" y="205" width="290" height="220" rx="24"/>
  <circle cx="125" cy="250" r="22" fill="#dbeafe"/>
  <text class="badge" x="125" y="256" text-anchor="middle">1</text>
  <text class="step" x="160" y="258">交付当前信息</text>
  <text class="body" x="120" y="315">问题・材料・目标</text>
  <text class="body" x="120" y="350">选择・卡点・新反馈</text>
  <rect x="115" y="378" width="220" height="30" rx="15" fill="#f1f5f9"/>
  <text class="subtitle" x="225" y="399" text-anchor="middle">信息不完整也可以</text>

  <path class="flow" d="M 370 315 H 455"/>

  <rect x="470" y="205" width="310" height="220" rx="24" fill="#1d4ed8" filter="url(#shadow)"/>
  <circle cx="515" cy="250" r="22" fill="#ffffff" fill-opacity="0.16"/>
  <text x="515" y="256" text-anchor="middle" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff">2</text>
  <text class="step-inverse" x="550" y="259">/dbs 路由判断</text>
  <text class="body-inverse" x="515" y="315">读取完整上下文</text>
  <text class="body-inverse" x="515" y="350">识别当前最关键任务</text>
  <rect x="515" y="377" width="220" height="30" rx="15" fill="#ffffff" fill-opacity="0.16"/>
  <text x="625" y="398" text-anchor="middle" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff">只选择 1 个 Skill</text>

  <path class="flow" d="M 780 315 H 850"/>

  <rect class="card" x="865" y="145" width="655" height="570" rx="28"/>
  <circle cx="910" cy="190" r="22" fill="#dbeafe"/>
  <text class="badge" x="910" y="196" text-anchor="middle">3</text>
  <text class="step" x="945" y="198">执行当前 Skill</text>
  <text class="subtitle" x="945" y="229">工具箱提供 25 个专项 Skill，本轮只调用一个。</text>

  <rect class="group" x="900" y="260" width="285" height="190" rx="18"/>
  <text class="group-title" x="922" y="291">判断与行动</text>
  <rect class="chip-bg" x="920" y="307" width="112" height="30" rx="15"/><text class="chip" x="976" y="327" text-anchor="middle">diagnosis</text>
  <rect class="chip-bg" x="1042" y="307" width="120" height="30" rx="15"/><text class="chip" x="1102" y="327" text-anchor="middle">benchmark</text>
  <rect class="chip-bg" x="920" y="347" width="118" height="30" rx="15"/><text class="chip" x="979" y="367" text-anchor="middle">deconstruct</text>
  <rect class="chip-bg" x="1048" y="347" width="114" height="30" rx="15"/><text class="chip" x="1105" y="367" text-anchor="middle">good-question</text>
  <rect class="chip-bg" x="920" y="387" width="70" height="30" rx="15"/><text class="chip" x="955" y="407" text-anchor="middle">goal</text>
  <rect class="chip-bg" x="1000" y="387" width="65" height="30" rx="15"/><text class="chip" x="1032" y="407" text-anchor="middle">action</text>
  <rect class="chip-bg" x="1075" y="387" width="87" height="30" rx="15"/><text class="chip" x="1118" y="407" text-anchor="middle">slowisfast</text>

  <rect class="group" x="1200" y="260" width="285" height="245" rx="18"/>
  <text class="group-title" x="1222" y="291">内容生产</text>
  <rect class="chip-bg" x="1220" y="307" width="92" height="30" rx="15"/><text class="chip" x="1266" y="327" text-anchor="middle">content</text>
  <rect class="chip-bg" x="1322" y="307" width="55" height="30" rx="15"/><text class="chip" x="1349" y="327" text-anchor="middle">hook</text>
  <rect class="chip-bg" x="1387" y="307" width="78" height="30" rx="15"/><text class="chip" x="1426" y="327" text-anchor="middle">xhs-title</text>
  <rect class="chip-bg" x="1220" y="347" width="82" height="30" rx="15"/><text class="chip" x="1261" y="367" text-anchor="middle">ai-check</text>
  <rect class="chip-bg" x="1312" y="347" width="75" height="30" rx="15"/><text class="chip" x="1349" y="367" text-anchor="middle">spread</text>
  <rect class="chip-bg" x="1397" y="347" width="68" height="30" rx="15"/><text class="chip" x="1431" y="367" text-anchor="middle">resonate</text>
  <rect class="chip-bg" x="1220" y="387" width="110" height="30" rx="15"/><text class="chip" x="1275" y="407" text-anchor="middle">script-flow</text>
  <rect class="chip-bg" x="1340" y="387" width="125" height="30" rx="15"/><text class="chip" x="1402" y="407" text-anchor="middle">wechat-html</text>
  <text class="subtitle" x="1222" y="462">从选题到发布，按当前问题进入。</text>

  <rect class="group" x="900" y="470" width="285" height="120" rx="18"/>
  <text class="group-title" x="922" y="501">工程与多端</text>
  <rect class="chip-bg" x="920" y="517" width="125" height="30" rx="15"/><text class="chip" x="982" y="537" text-anchor="middle">content-system</text>
  <rect class="chip-bg" x="1055" y="517" width="60" height="30" rx="15"/><text class="chip" x="1085" y="537" text-anchor="middle">bridge</text>
  <rect class="chip-bg" x="920" y="552" width="125" height="28" rx="14"/><text class="chip" x="982" y="571" text-anchor="middle">agent-migration</text>

  <rect class="group" x="900" y="605" width="285" height="95" rx="18"/>
  <text class="group-title" x="922" y="632">学习与讨论</text>
  <rect class="chip-bg" x="920" y="643" width="78" height="24" rx="12"/><text class="chip" x="959" y="660" text-anchor="middle">learning</text>
  <rect class="chip-bg" x="1008" y="643" width="82" height="24" rx="12"/><text class="chip" x="1049" y="660" text-anchor="middle">chatroom</text>
  <rect class="chip-bg" x="920" y="671" width="170" height="22" rx="11"/><text class="chip" x="1005" y="687" text-anchor="middle">chatroom-austrian</text>

  <rect class="group" x="1200" y="525" width="285" height="160" rx="18"/>
  <text class="group-title" x="1222" y="556">状态与决策</text>
  <rect class="chip-bg" x="1220" y="573" width="65" height="30" rx="15"/><text class="chip" x="1252" y="593" text-anchor="middle">save</text>
  <rect class="chip-bg" x="1295" y="573" width="75" height="30" rx="15"/><text class="chip" x="1332" y="593" text-anchor="middle">restore</text>
  <rect class="chip-bg" x="1380" y="573" width="85" height="30" rx="15"/><text class="chip" x="1422" y="593" text-anchor="middle">report</text>
  <rect class="chip-bg" x="1220" y="613" width="245" height="30" rx="15"/><text class="chip" x="1342" y="633" text-anchor="middle">decision・长期回填</text>

  <path class="flow" d="M 865 665 C 805 700 770 706 730 706"/>

  <rect class="card" x="420" y="575" width="310" height="170" rx="24"/>
  <circle cx="465" cy="620" r="22" fill="#dbeafe"/>
  <text class="badge" x="465" y="626" text-anchor="middle">4</text>
  <text class="step" x="500" y="628">获得当前产出</text>
  <text class="body" x="465" y="678">判断・内容・方案</text>
  <text class="body" x="465" y="713">文件・行动・待验证信号</text>

  <path class="loop" d="M 420 690 H 225 C 145 690 110 645 110 575 V 455"/>
  <rect x="122" y="622" width="245" height="34" rx="17" fill="#dbeafe"/>
  <text class="loop-label" x="244" y="645" text-anchor="middle">新反馈回到 /dbs</text>

  <text class="subtitle" x="80" y="840">循环持续到任务形成可使用的结果；每轮都会重新读取上下文。</text>
</svg>
